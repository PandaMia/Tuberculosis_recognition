services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuberculosis-recognition
    restart: unless-stopped
    init: true
    environment:
      MODEL_WEIGHTS_PATH: /app/source/model/model_weights.pth
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "127.0.0.1:18501:8501"
    volumes:
      - ./source/model:/app/source/model:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
